syntax = "proto3";

package ecmdb.policy.v1;
option go_package="ecmdb/policy/v1;policy";

message CheckLoginReq {
  // 身份凭证
  string token = 1;
}

message CheckLoginRes {
  int64 uid = 1;
}

message AuthorizeReq {
  // 身份凭证
  string token = 1;
  // 路径
  string path  = 2;
  // 方法
  string method = 3;
  // 资源
  string resource = 4;
}

message Response {
  bool allowed = 1;
  // 匹配到的角色列表
  repeated string roles = 2;
  // 匹配到的策略列表
  repeated string matched_policies = 3;
  // 拒绝或通过的原因详情
  string reason = 4;
}

service PolicyService {
  // 登录鉴权
  rpc CheckLogin(CheckLoginReq) returns (CheckLoginRes);
  // API 鉴权
  rpc Authorize(AuthorizeReq) returns (Response);
}