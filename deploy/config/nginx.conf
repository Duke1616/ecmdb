user nginx;
worker_processes auto;
events {
    use epoll;
    worker_connections 100000;
}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=10s;
    access_log /dev/stdout;
    error_log /dev/stdout debug;
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile on;
    keepalive_timeout 70;
    client_max_body_size 50G;
    client_header_buffer_size 128k;
    large_client_header_buffers 4 128k;


    # 明确设置 Brotli 优先级
    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Gzip 作为降级方案
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen  80;
        server_name frontend;
        index index.html;
        root /usr/share/nginx/html;

        location ^~ /api/iam {
            set $upstream_iam "http://eiam:8000";
            rewrite ^/api/iam(.*)$ /api$1 break;
            proxy_pass $upstream_iam;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ^~ /api/cmdb {
            set $upstream_cmdb "http://ecmdb:8000";
            rewrite ^/api/cmdb(.*)$ /api$1 break;
            proxy_pass $upstream_cmdb;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location ^~ /api/cmdb/plugin-runtime/ {
            set $upstream_cmdb "http://ecmdb:8000";
            rewrite ^/api/cmdb(.*)$ /api$1 break;
            proxy_pass $upstream_cmdb;
            proxy_connect_timeout 60s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location ^~ /api/ticket {
            set $upstream_iam "http://eflow:8000";
            rewrite ^/api/ticket(.*)$ /api$1 break;
            proxy_pass $upstream_iam;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ^~ /api/alert {
            set $upstream_alert "http://ealert:8000";
            rewrite ^/api/alert(.*)$ /api$1 break;
            proxy_pass $upstream_alert;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ^~ /api/task {
            set $upstream_task "http://etask:8000";
            rewrite ^/api/task(.*)$ /api$1 break;
            proxy_pass $upstream_task;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ^~ /minio {
            set $upstream_minio "http://minio:9000";
            rewrite ^/minio(/.*)$ $1 break;
            proxy_pass $upstream_minio;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            add_header Vary Accept-Encoding always;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # 带 hash 的构建资源可以长期缓存；缺失的静态资源直接 404，避免回退成 index.html。
        location ~* \.(?:js|css|json|xml|ico|gif|jpe?g|png|webp|svg|woff2?|eot|ttf|otf)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Vary Accept-Encoding always;
            try_files $uri =404;
        }
    }
}
