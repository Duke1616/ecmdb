# etask 全量配置文件 (all-in-one 模式示例)

# 日志配置
log:
  debug: true # 是否开启调试模式，开启后会打印更多详细日志

# Agent 模块配置 (基于 Kafka 队列的异步执行器)
agent:
  name: Kafka-Agent # 实例显示名称
  topic: agent_execute # 监听的任务消息队列 Topic
  desc: 异步任务执行代理：负责从消息队列拉取并执行来自调度中心的任务指令 # 描述信息，展示在管理后台

# 原生 Executor 模块配置 (基于 gRPC 的直接执行器)
executor:
  # 执行模式: PUSH(默认, 调度中心主动推送请求) 或 PULL(执行器主动向调度中心长轮询拉取)
  mode: "PUSH"
  # 执行器集群功能描述
  desc: "通用计算节点：提供 Shell 与 Python 脚本等系统级基础执行能力的默认执行器集群"

# 数据库配置 (MySQL)
mysql:
  dsn: "etask:123456@tcp(ecmdb-mysql:3306)/etask?charset=utf8mb4&collation=utf8mb4_general_ci&parseTime=True&loc=Local&timeout=1s&readTimeout=3s&writeTimeout=3s&multiStatements=true&interpolateParams=true"

# 会话与 Cookie 配置 (Web 端使用)
session:
  session_encrypted_key: "1234567890Key" # Session 加密 Key
  cookie:
    domain: ".example.com"  # Cookie 作用域
    name: "ecmdb-token-key" # Cookie 名称

# 缓存配置 (Redis)
redis:
  addr: "ecmdb-redis:6379"
  password: "1234567890"
  db: 0

# 消息队列配置 (Kafka)
kafka:
  network: tcp
  addresses:
    - ecmdb-kafka:9092

# 注册中心配置 (Etcd)
etcd:
  endpoints:
    - ecmdb-etcd:2379

# web 配置: 对外暴露 http 接口
web:
  host: "0.0.0.0"
  port: 8000

# 策略鉴权：ECMDB 服务地址，用于登录验证与权限鉴权
policy:
  auth_url: http://ecmdb:8000

# gRPC 服务及客户端配置
grpc:
  server:
    # 调度中心 gRPC Server 配置
    scheduler:
      name: scheduler # 注册到 Etcd 的服务名称
      listen_addr: "0.0.0.0:9002" # 监听端口
      advertise_addr: ""  # 广播地址，留空则自动探测物理 IP
      auth_token: "1234567890" # JWT 认证 Token，留空则不开启
    # 执行器 gRPC Server 配置
    executor:
      id: node-01 # 节点唯一标识
      name: execute # 执行器分组名称
      listen_addr: "0.0.0.0:9004" # 监听端口
      advertise_addr: ""  # 广播地址
      auth_token: "1234567890" # JWT 认证 Token
  client:
    # 外部依赖服务客户端
    ecmdb:
      name: "ecmdb" # ECMDB 服务名
      auth_token: "1234567890" # 访问 Token
    # 内部调度中心客户端 (用于执行器上报结果)
    scheduler:
      name: "scheduler"
      auth_token: "1234567890"

# 调度引擎核心参数
scheduler:
  batchTimeout: 3000000000 # 批量获取任务的超时时间 (纳秒, 3s)
  batchSize: 100 # 每次调度扫描任务的最大数量
  preemptedTimeout: 600000000000 # 抢占超时时间 (纳秒, 10m)，超过此时间未执行则重新触发
  scheduleInterval: 10000000000 # 核心调度循环间隔 (纳秒, 10s)
  renewInterval: 5000000000 # 任务续约间隔 (纳秒, 5s)
  maxConcurrentTasks: 1000 # 节点支持的最大并发执行任务数
  tokenAcquireTimeout: 3000000000 # 令牌获取超时 (纳秒, 3s)
  pollInterval: 1000000000 # 轮询间隔 (纳秒, 1s)
  reportTimeout: 10000000000 # 状态上报超时 (纳秒, 10s)

# 补偿机制相关配置
compensator:
  # 重试补偿：处理执行失败的任务
  retry:
    maxRetryCount: 3 # 最大重试次数
    prepareTimeoutWindowMs: 10000000000 # 准备阶段的超时窗口
    batchSize: 100 # 单次补偿扫描的任务量
    minDuration: 1000000000 # 两次补偿执行的最小间隔
  # 重新调度补偿：处理抢占成功但节点宕机未运行的任务
  reschedule:
    batchSize: 100
    minDuration: 1000000000
  # 中断补偿：处理需要强行终止的任务
  interrupt:
    batchSize: 100
    minDuration: 1000000000